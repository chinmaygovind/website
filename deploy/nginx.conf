# Personal website — serves the Wii menu (and the rest of the static site) at /.
# The Flask app handles /ttr itself (302 redirect to TTR_URL), so nginx just
# proxies everything to gunicorn on 127.0.0.1:5002.
#
# HTTPS is managed by certbot (Let's Encrypt): after this file is installed and
# DNS points cgovind.com at the box, `certbot --nginx` adds the 443 server
# blocks and an HTTP->HTTPS redirect in-place. Re-running deploy/setup.sh
# overwrites this file, so re-run certbot afterwards to restore TLS.
server {
    listen 80 default_server;
    server_name cgovind.com www.cgovind.com;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# Ticket to Ride subdomain (the /ttr redirect target).
#
# TTR serves everything at its own root and speaks WebSockets, so it needs its
# OWN host — it runs as its own gunicorn (eventlet worker) on 127.0.0.1:5001.
# Set TTR_URL=https://ttr.cgovind.com in .env so /ttr redirects here.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name ttr.cgovind.com;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        # WebSocket upgrade headers — required for Socket.IO
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

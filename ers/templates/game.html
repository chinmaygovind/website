{% extends "base.html" %}
{% block title %}Game | Egyptian Rat Screw{% endblock %}
{% block body %}
<div class="table-page">
  <div class="felt-room"></div>

  <div class="game-top">
    <div class="topleft">
      <div class="code">Table {{ game.code }}</div>
      <div class="ping" id="ping">Ping: --</div>
    </div>
    <div id="turnMsg" class="chip" style="font-size:.85rem"></div>
    <div class="topright">
      <div class="rulechips" id="ruleChips"></div>
      <button class="leave-btn" onclick="leaveGame()">Leave</button>
    </div>
  </div>

  <div class="table-oval"></div>
  <div id="seats"></div>
  <div id="challenge"></div>
  <div class="pile" id="pile"></div>
  <div class="pile-count" id="pileCount"></div>

  <div class="mystack">
    <div class="stack-cards" id="myStack" onclick="doFlip()"></div>
    <div class="flip-lbl" id="flipLbl">flip</div>
  </div>

  <div class="spectate-badge" id="spectateBadge" style="display:none">👁 Spectating</div>
  <div class="my-status" id="myStatus"></div>

  <button class="slap-btn" onclick="doSlap()">SLAP</button>
  <div class="slap-flash" id="flash"></div>
  <div class="toast" id="toast"></div>

  <div class="side right">
    <h3 id="standTitle" style="display:none">Standings</h3>
    <div class="standings" id="standings" style="display:none"></div>
  </div>
  <div class="slog" id="slog"></div>
  <div class="controls">
    <div><b>F</b> place card</div>
    <div><b>Space</b> slap</div>
  </div>

  <div class="overlay" id="overlay">
    <div class="box">
      <div class="crown">👑</div>
      <h1 id="winName"></h1>
      <a class="btn big" href="/lobbies">Back to lobbies</a>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const GAME_CODE = "{{ game.code }}";
const MY_PID = "{{ my_pid }}";
let ROSTER = {{ roster_json|safe }};
</script>
<script src="{{ url_for('static', filename='js/game.js') }}?v={{ asset_version }}"></script>
{% endblock %}

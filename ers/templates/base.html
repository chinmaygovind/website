<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#221610"/>
  <title>{% block title %}Egyptian Rat Screw{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json"/>
  <link rel="icon" href="/static/img/icon.svg"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/img/icon-32.png"/>
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Rat Screw"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ asset_version }}"/>
  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => {});
    }
  </script>
</body>
</html>

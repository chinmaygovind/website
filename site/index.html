<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Chinmay Govind — personal site" />
    <title>Warning</title>
    <style>
      #warning {
        height: 100%; 
        width: 100%;
      }
      .fade-in {
        opacity: 0;
        transition: opacity 2s ease-in-out;
      }
      .fade-in.active {
        opacity: 1;
        transition: opacity 1s ease-in-out;
      }
      .fade-out.active {
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }
      #root {
        display: none;
        width: 100%;
        height: 100%;
        transition: opacity 1s ease-in-out;
      }
      /* Ticket to Ride channel tile (fills the first empty gray Wii slot) */
      #channel-ttr {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        background: #ffffff;
        border: 3px solid #b9c6cd;
        border-radius: 18px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
        cursor: pointer;
        overflow: hidden;
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      #channel-ttr:hover {
        border-color: #26a4e3;
        box-shadow: 0 0 14px rgba(38, 164, 227, 0.75);
      }
      #channel-ttr .ttr-emoji {
        font-size: 5vh;
        line-height: 1;
      }
      #channel-ttr .ttr-label {
        margin-top: 0.6vh;
        font-size: 1.7vh;
        font-weight: 700;
        color: #37474f;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      /* Ticket to Ride "channel preview" screen (mirrors the Wii startmenu:
         a channel panel with Wii Menu / Start buttons underneath) */
      #ttr-start {
        position: fixed;
        inset: 0;
        z-index: 11;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3.2vh;
        background: linear-gradient(#eef4f7, #d3e0e8);
        opacity: 0;
        transition: opacity 0.35s ease;
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      #ttr-start.visible {
        display: flex;
        opacity: 1;
      }
      #ttr-start .screen {
        width: 72vw;
        max-width: 1080px;
        aspect-ratio: 16 / 9;
        border-radius: 2.4vh;
        overflow: hidden;
        background: radial-gradient(circle at 50% 32%, #2e7d32, #14402a);
        box-shadow: 0 1.2vh 4vh rgba(0, 0, 0, 0.28);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #fff;
        transform: scale(0.85);
        transition: transform 0.35s ease;
      }
      #ttr-start.visible .screen {
        transform: scale(1);
      }
      #ttr-start .screen .train {
        font-size: 13vh;
        line-height: 1;
      }
      #ttr-start .screen h1 {
        margin: 1.6vh 0 0;
        font-size: 6vh;
        letter-spacing: 0.02em;
      }
      #ttr-start .screen p {
        margin: 0.8vh 0 0;
        font-size: 2.4vh;
        opacity: 0.85;
      }
      #ttr-start .buttons {
        display: flex;
        gap: 4vw;
      }
      #ttr-start button {
        font-family: inherit;
        font-size: 3vh;
        font-weight: 600;
        color: #37474f;
        padding: 1.5vh 5vw;
        border: 2px solid #7ec8ef;
        border-radius: 999px;
        background: linear-gradient(#ffffff, #e6edf1);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        cursor: pointer;
      }
      #ttr-start button:hover {
        border-color: #26a4e3;
        box-shadow: 0 0 14px rgba(38, 164, 227, 0.6);
      }
      #ttr-start button.start {
        color: #1b5e20;
      }
    </style>
  </head>
  <body style = "background-color: black; overflow-y: hidden">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <img id = "warning" class="fade-in" src = "images/warning.png" onclick="goToMenu()"></img>
  <div id="root" class="fade-in"></div>
  <audio id="clickSounds" src="audio/warning.wav"></audio>
  <audio id="backgroundMusic" src="audio/wiimenu.mp3" loop></audio>
  </body>
  <script>
    var warningLoaded = false;
    window.addEventListener('DOMContentLoaded', (event) => {
        const image = document.querySelector('.fade-in');
        image.classList.add('active');
      setTimeout(() => {
        warningLoaded = true;
        image.classList.add('fade-out');
        image.classList.remove('fade-in');
        image.classList.remove('active');
      }, 1500);
    });

    function goToMenu() {
      if (warningLoaded) {
        var clickSound = document.getElementById("clickSounds");
        clickSound.play();
        const image = document.querySelector('.fade-out');
        image.classList.add('active');
        warningLoaded = false;
        setTimeout(startMenu(), 1500);
      }
    }

    function startMenu() {
      document.getElementById("root").style.display = "inline";
      setTimeout(() => {
        document.getElementById("warning").remove();
        document.title = "Wii Menu";
        const root = document.getElementById("root");
        root.classList.add('active');
        var bgm = document.getElementById("backgroundMusic");
        bgm.play();
        var clickSound = document.getElementById("clickSounds");
        clickSound.src = "audio/channelClicked.wav";
        // Inject Wii menu HTML
        root.innerHTML = `
          <div id="channels-container">
            <div id="channels">
              <img src="images/wiimenu.png" style="position: absolute; top: 0; left: 0; width: 100%; z-index: 1;">
              <video src="videos/channels/channel0.mp4" autoplay loop muted id="channel-0" style="z-index: 0; position: relative; float: left; margin: 2.5% 0% 0 8%; width: 21%; height: 21%;"></video>
              <video src="videos/channels/channel1.mp4" autoplay loop muted id="channel-1" style="z-index: 0; position: relative; float: left; margin: 4.45% 0 0 0%; width: 21%; height: 21%;"></video>
              <video src="videos/channels/channel2.mp4" autoplay loop muted id="channel-2" style="z-index: 0; position: relative; float: left; margin: 4.4% 0% 0 0%; width: 21%; height: 21%;"></video>
              <video src="videos/channels/channel3.mp4" autoplay loop muted id="channel-3" style="z-index: 0; position: relative; float: left; margin: 4% 0 0 0%; width: 22%; height: 21%;"></video>
              <video src="videos/channels/channel4.mp4" autoplay loop muted id="channel-4" style="z-index: 0; position: relative; float: left; margin: 0.45% 0 0 8%; width: 21%; height: 24%;"></video>
              <video src="videos/channels/channel5.mp4" autoplay loop muted id="channel-5" style="z-index: 0; position: relative; float: left; margin: 0% 0 0 0%; width: 21%; height: 21%;"></video>
              <video src="videos/channels/channel6.mp4" autoplay loop muted id="channel-6" style="z-index: 0; position: relative; float: left; margin: 0% 0 0 0%; width: 21%; height: 21%;"></video>
              <video src="videos/channels/channel7.mp4" autoplay loop muted id="channel-7" style="z-index: 0; position: relative; float: left; margin: 0% 0 0 0%; width: 21%; height: 21%;"></video>
              <div id="channel-ttr" style="position: absolute; left: 8.5%; top: 52%; width: 19.5%; height: 18%; z-index: 2;">
                <span class="ttr-emoji">🚂</span>
                <span class="ttr-label">Ticket to Ride</span>
              </div>
            </div>
          </div>
          <img id="startmenu" src="images/channels/startmenu0.png" style="opacity:0; position:fixed; top:0; left:0; width:100vw; height:100vh; transform:scale(0.01); z-index:10; transition:transform 0.5s, opacity 0.25s ease-in;">
          <div id="ttr-start">
            <div class="screen">
              <div class="train">🚂</div>
              <h1>Ticket to Ride</h1>
              <p>Multiplayer online board game</p>
            </div>
            <div class="buttons">
              <button class="wiimenu" type="button">Wii Menu</button>
              <button class="start" type="button">Start</button>
            </div>
          </div>
        `;
        // TTR channel: click the tile → zoom in + show a channel-preview screen,
        // then "Start" hands off to /ttr (which redirects to the TTR service).
        const ttrTile = document.getElementById("channel-ttr");
        const ttrStart = document.getElementById("ttr-start");
        function playClick() {
          const s = document.getElementById("clickSounds");
          if (s) { s.currentTime = 0; s.play().catch(() => {}); }
        }
        if (ttrTile && ttrStart) {
          ttrTile.addEventListener("click", function (e) {
            e.stopPropagation();
            const channels = document.getElementById("channels");
            channels.style.transformOrigin =
              (window.innerWidth * 0.18) + "px " + (window.innerHeight * 0.61) + "px";
            channels.style.transition = "transform 0.5s, opacity 0.3s ease-in";
            channels.style.transform = "scale(6)";
            channels.style.opacity = "0";
            playClick();
            const bgm = document.getElementById("backgroundMusic");
            if (bgm) { bgm.pause(); }
            setTimeout(function () { ttrStart.classList.add("visible"); }, 320);
          });
          ttrStart.querySelector("button.start").addEventListener("click", function (e) {
            e.stopPropagation();
            playClick();
            ttrStart.style.opacity = "0";
            setTimeout(function () { window.location.href = "/ttr"; }, 420);
          });
          ttrStart.querySelector("button.wiimenu").addEventListener("click", function (e) {
            e.stopPropagation();
            playClick();
            ttrStart.classList.remove("visible");
            const channels = document.getElementById("channels");
            channels.style.transition = "transform 0.45s, opacity 0.45s ease-out";
            channels.style.transform = "scale(1)";
            channels.style.opacity = "1";
            const bgm = document.getElementById("backgroundMusic");
            if (bgm) { bgm.play().catch(() => {}); }
          });
        }
        // Wii menu logic
        let state = "WII_MENU";
        let currentChannel = -1;
        root.addEventListener("click", function(e) {
          if (state === "WII_MENU") {
            let x = e.clientX / window.innerWidth;
            let y = e.clientY / window.innerHeight;
            let selected = false;
            for (let i = 0; i < 8; i++) {
              let channelX = i % 4;
              let channelY = Math.floor(i / 4);
              let lowX = (0.08 + 0.21 * channelX);
              let highX = lowX + 0.21;
              let lowY = (0.04 + 0.25 * channelY);
              let highY = lowY + 0.25;
              if (lowX < x && x < highX && lowY < y && y < highY) {
                selected = true;
                currentChannel = i;
                let scale = 8;
                let channels = document.getElementById('channels');
                let targetX = window.innerWidth * (0.16 + 0.23 * channelX);
                let targetY = window.innerHeight * (lowY + highY) / 2;
                channels.style.transformOrigin = targetX + 'px ' + targetY + 'px';
                channels.style.transform = 'scale(' + scale + ')';
                channels.style.transition = 'transform 0.5s, opacity 0.25s ease-in';
                channels.style.opacity = '0';
                let startmenu = document.getElementById("startmenu");
                startmenu.style.zIndex = 10;
                startmenu.style.opacity = 1;
                startmenu.style.width = "100vw";
                startmenu.style.height = "100vh";
                startmenu.style.transform = "scale(1)";
                startmenu.style.transition = 'transform 0.5s, opacity 0.25s ease-in';
                startmenu.src = `images/channels/startmenu${i}.png`;
                var clickSound = document.getElementById("clickSounds");
                clickSound.play();
                var bgm = document.getElementById("backgroundMusic");
                bgm.pause();
                setTimeout(() => {
                  bgm.src = `audio/channels/channel${currentChannel}.mp3`;
                  bgm.removeAttribute("loop");
                  bgm.play();
                }, 250);
              }
            }
            if (selected) setTimeout(() => state = "START_MENU", 100);
          }
          if (state === "START_MENU") {
            let x = e.clientX / window.innerWidth;
            let y = e.clientY / window.innerHeight;
            let clickState = "NONE";
            if (0.2 < x && x < 0.48 && 0.8 < y && y < 0.93) clickState = "LEFT";
            if (0.52 < x && x < 0.8 && 0.8 < y && y < 0.93) clickState = "RIGHT";
            if (clickState !== "NONE") {
              var bgm = document.getElementById("backgroundMusic");
              bgm.pause();
              var clickSound = document.getElementById("clickSounds");
              clickSound.src = "audio/refresh.wav";
              clickSound.play();
              setTimeout(() => {
                root.classList.remove('fade-in');
                root.classList.add('fade-out');
              }, 500);
              if (clickState === "LEFT") {
                setTimeout(() => {
                  window.location.reload();
                }, 2500);
              } else if (clickState === "RIGHT") {
                setTimeout(() => {
                  window.location.href = "warning.html";
                }, 2500);
              }
            }
          }
        });
      }, 3000);
    }
  </script>
</html>

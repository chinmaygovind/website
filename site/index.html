<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="favicon.ico" />
    <title>Chinmay's Website</title>
    <style>
      @font-face {
        font-family: "xkcd Script";
        src: url("fonts/xkcd-script.woff") format("woff");
        font-display: swap;
      }
      html, body {
        margin: 0;
        background: #fff;
      }
      body {
        color: #000;
        font-family: "xkcd Script", "Comic Sans MS", cursive;
      }
      .top {
        height: 33.333vh;
        height: 33.333dvh;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0 6vw;
      }
      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 12vw, 7rem);
      }
      p {
        margin: 0;
        max-width: 55%;
        text-align: right;
        font-size: clamp(1rem, 4.5vw, 2.25rem);
      }
      .name {
        color: blue;
      }
    </style>
  </head>
  <body>
    <div class="top">
      <h1>hey!</h1>
      <p>welcome to <span class="name">chinmay govind</span>'s website</p>
    </div>
  </body>
</html>

{% extends "base.html" %}
{% block title %}King of Tokyo{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
  crossorigin="anonymous" referrerpolicy="no-referrer"/>
{% endblock %}
{% block body %}
<div class="game-shell">
  <header class="game-top">
    <a class="brand small" href="/lobbies"><img src="/static/img/icon.svg" alt="" class="brand-ico"/> King of Tokyo</a>
    <div class="turn-banner" id="turnBanner">Loading…</div>
    <div class="top-right">
      <button class="icon-btn" id="muteBtn" title="Mute sound">🔊</button>
      <button class="icon-btn" id="logToggle" title="Game log">📜</button>
      <button class="icon-btn door-btn" id="leaveBtn" title="Leave game">🚪</button>
    </div>
  </header>

  <main class="board" id="board">
    <div class="tokyo-ring" id="tokyo">
      <div class="tokyo-circle city" id="slot-city">
        <div class="circle-label">Tokyo City</div>
        <div class="slot-mon" id="city-mon"></div>
      </div>
      <div class="tokyo-circle bay" id="slot-bay">
        <div class="circle-label">Tokyo Bay</div>
        <div class="slot-mon" id="bay-mon"></div>
      </div>
    </div>
    <div class="outskirts-label">Outskirts</div>
    <div class="monsters" id="monsters"></div>
  </main>

  <aside class="log-panel" id="logPanel">
    <div class="log-head">Game log <button class="icon-btn" id="logClose">✕</button></div>
    <div class="log-feed" id="logFeed"></div>
  </aside>

  <section class="controls" id="controls">
    <div class="controls-left">
      <div class="dice-tray" id="diceTray"></div>
      <div class="action-row" id="actionRow"></div>
    </div>
    <div class="controls-right">
      <div class="shop" id="shop"></div>
    </div>
  </section>

  <div class="mobile-tab-bar">
    <button class="mobile-tab active" data-panel="board">
      <span class="mobile-tab-icon">🏙️</span>
      <span>Board</span>
    </button>
    <button class="mobile-tab" data-panel="dice">
      <span class="mobile-tab-icon" id="diceTabIcon">🎲</span>
      <span>Dice</span>
    </button>
    <button class="mobile-tab" data-panel="deck">
      <span class="mobile-tab-icon">🎴</span>
      <span>Deck</span>
    </button>
  </div>

  <div class="card-popup" id="cardPopup"></div>

  <div class="overlay" id="overlay" style="display:none">
    <div class="overlay-card" id="overlayCard"></div>
  </div>

  <div class="toast" id="toast"></div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
window.KOT = {
  code: "{{ game.code }}",
  myPid: "{{ my_pid }}",
  roster: {{ roster_json|safe }},
};
</script>
<script src="{{ url_for('static', filename='js/game.js') }}?v={{ asset_version }}"></script>
{% endblock %}

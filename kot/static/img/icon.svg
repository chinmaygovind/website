<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="badge"><rect x="0" y="0" width="512" height="512" rx="104"/></clipPath>
    <radialGradient id="sun" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffe9a3"/>
      <stop offset="55%" stop-color="#f2c035"/>
      <stop offset="100%" stop-color="#e08a1e"/>
    </radialGradient>
    <linearGradient id="beastfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6fdc7e"/>
      <stop offset="100%" stop-color="#33a24f"/>
    </linearGradient>
    <!-- The whole monster, defined once and stamped twice: a fat dark stroke
         behind for the comic outline, then the green fill on top. -->
    <g id="beast">
      <!-- tail -->
      <path d="M300,360 Q450,360 496,486 L452,486 Q420,404 300,404 Z"/>
      <!-- back spikes -->
      <path d="M176,214 L150,150 L214,196 Z"/>
      <path d="M212,150 L206,74 L262,140 Z"/>
      <path d="M300,150 L306,74 L250,140 Z"/>
      <path d="M336,214 L362,150 L298,196 Z"/>
      <!-- legs + feet -->
      <rect x="188" y="322" width="60" height="124" rx="26"/>
      <rect x="264" y="322" width="60" height="124" rx="26"/>
      <ellipse cx="206" cy="446" rx="52" ry="26"/>
      <ellipse cx="306" cy="446" rx="52" ry="26"/>
      <!-- arms -->
      <ellipse cx="150" cy="300" rx="34" ry="52" transform="rotate(18 150 300)"/>
      <ellipse cx="362" cy="300" rx="34" ry="52" transform="rotate(-18 362 300)"/>
      <!-- torso -->
      <ellipse cx="256" cy="304" rx="104" ry="118"/>
      <!-- head -->
      <circle cx="256" cy="188" r="86"/>
      <!-- brow ridge -->
      <path d="M170,168 Q256,120 342,168 L342,196 Q256,158 170,196 Z"/>
    </g>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="104" fill="#17121f"/>

  <g clip-path="url(#badge)">
    <!-- sunburst -->
    <g fill="#f2c035" opacity="0.42">
      <g id="ray"><polygon points="256,2 236,190 276,190"/></g>
      <use href="#ray" transform="rotate(30 256 190)"/>
      <use href="#ray" transform="rotate(60 256 190)"/>
      <use href="#ray" transform="rotate(90 256 190)"/>
      <use href="#ray" transform="rotate(120 256 190)"/>
      <use href="#ray" transform="rotate(150 256 190)"/>
      <use href="#ray" transform="rotate(180 256 190)"/>
      <use href="#ray" transform="rotate(210 256 190)"/>
      <use href="#ray" transform="rotate(240 256 190)"/>
      <use href="#ray" transform="rotate(270 256 190)"/>
      <use href="#ray" transform="rotate(300 256 190)"/>
      <use href="#ray" transform="rotate(330 256 190)"/>
    </g>
    <circle cx="256" cy="190" r="132" fill="url(#sun)"/>

    <!-- city skyline -->
    <g fill="#0d0a16">
      <rect x="18" y="356" width="60" height="160"/>
      <rect x="82" y="322" width="46" height="194"/>
      <rect x="132" y="384" width="52" height="132"/>
      <rect x="330" y="340" width="48" height="176"/>
      <rect x="382" y="372" width="60" height="144"/>
      <rect x="446" y="326" width="52" height="190"/>
    </g>
    <g fill="#f2c035" opacity="0.5">
      <rect x="94" y="340" width="9" height="12"/><rect x="112" y="340" width="9" height="12"/>
      <rect x="94" y="366" width="9" height="12"/><rect x="112" y="366" width="9" height="12"/>
      <rect x="458" y="346" width="9" height="12"/><rect x="476" y="346" width="9" height="12"/>
      <rect x="458" y="372" width="9" height="12"/><rect x="476" y="372" width="9" height="12"/>
      <rect x="36" y="374" width="10" height="13"/><rect x="54" y="374" width="10" height="13"/>
    </g>

    <!-- monster: dark comic outline, then green -->
    <use href="#beast" fill="#0d0a16" stroke="#0d0a16" stroke-width="26" stroke-linejoin="round"/>
    <use href="#beast" fill="url(#beastfill)"/>

    <!-- belly plates -->
    <g fill="#8fe89b" opacity="0.55">
      <ellipse cx="256" cy="300" rx="52" ry="20"/>
      <ellipse cx="256" cy="344" rx="46" ry="18"/>
      <ellipse cx="256" cy="384" rx="38" ry="15"/>
    </g>

    <!-- eyes (angry) -->
    <g>
      <ellipse cx="222" cy="196" rx="24" ry="26" fill="#fff4d6"/>
      <ellipse cx="290" cy="196" rx="24" ry="26" fill="#fff4d6"/>
      <circle cx="228" cy="200" r="11" fill="#17121f"/>
      <circle cx="284" cy="200" r="11" fill="#17121f"/>
    </g>
    <!-- roaring mouth with fangs -->
    <path d="M206,236 Q256,266 306,236 Q300,286 256,290 Q212,286 206,236 Z" fill="#2a0f16"/>
    <g fill="#fff4d6">
      <polygon points="216,240 230,240 223,258"/>
      <polygon points="240,244 254,244 247,264"/>
      <polygon points="272,244 286,244 279,264"/>
      <polygon points="292,240 306,240 299,258"/>
    </g>

    <!-- crown -->
    <path d="M196,128 L196,80 L226,106 L256,64 L286,106 L316,80 L316,128 Z"
          fill="#f2c94c" stroke="#0d0a16" stroke-width="10" stroke-linejoin="round"/>
    <circle cx="226" cy="112" r="7" fill="#eb5757"/>
    <circle cx="256" cy="112" r="7" fill="#56ccf2"/>
    <circle cx="286" cy="112" r="7" fill="#eb5757"/>
  </g>
</svg>
